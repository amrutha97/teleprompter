<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>README preview · Teleprompter</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5/github-markdown.min.css" />
  <style>
    body { margin: 0; background: #0d1117; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 32px 24px 80px; }
    .markdown-body { box-sizing: border-box; min-width: 200px; max-width: 980px; }
    .markdown-body img, .markdown-body video { max-width: 100%; height: auto; }
    .hint {
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 20px;
      padding: 12px 16px;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
    }
    .hint code { background: #21262d; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="hint" id="hint">
      Preview uses GitHub-style dark theme. Serve this folder so assets load:<br />
      <code>python3 -m http.server 8889</code>
      → <code>http://localhost:8889/preview-readme.html</code>
    </div>
    <article class="markdown-body" id="out"><p>Loading README…</p></article>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script>
    (async function () {
      const out = document.getElementById("out");
      try {
        const res = await fetch("README.md");
        if (!res.ok) throw new Error(res.status);
        const md = await res.text();
        out.innerHTML = marked.parse(md, { gfm: true, breaks: false });
      } catch (e) {
        out.innerHTML =
          '<p class="hint">Could not load <code>README.md</code>. Run <code>python3 -m http.server 8889</code> from the teleprompter folder, then open this URL again.</p>';
      }
    })();
  </script>
</body>
</html>
